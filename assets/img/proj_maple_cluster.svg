<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f8f9fa"/>
  <!-- Axes -->
  <line x1="55" y1="30" x2="55" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <line x1="55" y1="200" x2="375" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <!-- Survival curve - Cluster 1 (active users, slow churn) -->
  <polyline points="65,50 110,55 155,68 200,88 245,115 290,148 335,175 375,185"
    fill="none" stroke="#00369f" stroke-width="2.5"/>
  <!-- Survival curve - Cluster 2 (mid users) -->
  <polyline points="65,50 110,65 155,90 200,120 245,150 290,172 335,188 375,193"
    fill="none" stroke="#2698ba" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Survival curve - Cluster 3 (early churners) -->
  <polyline points="65,50 110,80 155,120 200,155 245,175 290,188 335,194 375,197"
    fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- Showcase event line -->
  <line x1="210" y1="30" x2="210" y2="200" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="185" y="30" width="70" height="16" fill="#e63946" rx="3" opacity="0.12"/>
  <text x="220" y="41" font-family="sans-serif" font-size="8" fill="#e63946" text-anchor="middle">쇼케이스</text>
  <!-- Y axis label -->
  <text x="30" y="118" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,30,118)">잔존율</text>
  <text x="215" y="218" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle">시간(일) →</text>
  <!-- Legend -->
  <line x1="65" y1="228" x2="85" y2="228" stroke="#00369f" stroke-width="2.5"/>
  <text x="90" y="232" font-family="sans-serif" font-size="8" fill="#495057">활성 유저</text>
  <line x1="150" y1="228" x2="170" y2="228" stroke="#2698ba" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="175" y="232" font-family="sans-serif" font-size="8" fill="#495057">중간 유저</text>
  <line x1="240" y1="228" x2="260" y2="228" stroke="#adb5bd" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="265" y="232" font-family="sans-serif" font-size="8" fill="#495057">이탈 유저</text>
</svg>
