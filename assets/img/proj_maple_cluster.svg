<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)" rx="8"/>

  <!-- Axes -->
  <line x1="70" y1="40" x2="70" y2="255" stroke="#334155" stroke-width="1"/>
  <line x1="70" y1="255" x2="560" y2="255" stroke="#334155" stroke-width="1"/>
  <!-- Y grid -->
  <line x1="70" y1="100" x2="560" y2="100" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="70" y1="155" x2="560" y2="155" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="70" y1="200" x2="560" y2="200" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- Y axis label -->
  <text x="20" y="150" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#475569" text-anchor="middle" transform="rotate(-90,20,150)">생존율 (잔존 비율)</text>
  <text x="22" y="45"  font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b">1.0</text>
  <text x="22" y="103" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b">0.7</text>
  <text x="22" y="158" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b">0.4</text>

  <!-- Survival curve cluster 1 - 활성 (blue, slow drop) -->
  <polyline points="70,45 130,50 190,60 250,75 310,95 370,120 430,148 490,170 550,185"
    fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="70,45 130,50 190,60 250,75 310,95 370,120 430,148 490,170 550,185 550,255 70,255"
    fill="#3b82f6" opacity="0.07"/>

  <!-- Survival curve cluster 2 - 중간 (teal) -->
  <polyline points="70,45 130,60 190,85 250,115 310,145 370,172 430,195 490,215 550,228"
    fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Survival curve cluster 3 - 이탈 (gray, fast drop) -->
  <polyline points="70,45 130,80 190,125 250,165 310,195 370,218 430,235 490,245 550,251"
    fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Showcase event marker -->
  <line x1="295" y1="40" x2="295" y2="255" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="261" y="40" width="72" height="18" fill="#1e3a5f" rx="3"/>
  <text x="297" y="52" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">쇼케이스 이벤트</text>

  <!-- X axis label -->
  <text x="315" y="270" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#475569" text-anchor="middle">경과 일수</text>

  <!-- Legend -->
  <line x1="72" y1="288" x2="100" y2="288" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="106" y="292" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd">활성 유저</text>
  <line x1="195" y1="288" x2="223" y2="288" stroke="#06b6d4" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="229" y="292" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#67e8f9">중간 유저</text>
  <line x1="318" y1="288" x2="346" y2="288" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="352" y="292" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">이탈 유저</text>

  <!-- Title -->
  <text x="70" y="324" font-family="'Helvetica Neue',sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">메이플스토리 유저 행동 클러스터링</text>
  <text x="70" y="342" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#64748b">군집별 생존 분석 · 쇼케이스 반응 차이 검증</text>
</svg>
