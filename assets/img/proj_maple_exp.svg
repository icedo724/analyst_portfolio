<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.02"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)" rx="8"/>

  <!-- Axes -->
  <line x1="70" y1="40" x2="70" y2="250" stroke="#334155" stroke-width="1"/>
  <line x1="70" y1="250" x2="560" y2="250" stroke="#334155" stroke-width="1"/>
  <line x1="70" y1="100" x2="560" y2="100" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="70" y1="150" x2="560" y2="150" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="70" y1="200" x2="560" y2="200" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- Time series line (daily avg EXP) -->
  <polygon points="70,220 105,215 140,205 175,198 205,188 225,170 240,142 258,108 275,85 292,78 310,88 330,100 355,112 385,120 415,125 445,130 480,133 515,136 550,138 550,250 70,250"
    fill="url(#area)"/>
  <polyline points="70,220 105,215 140,205 175,198 205,188 225,170 240,142 258,108 275,85 292,78 310,88 330,100 355,112 385,120 415,125 445,130 480,133 515,136 550,138"
    fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- New area event marker -->
  <line x1="258" y1="40" x2="258" y2="250" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="218" y="40" width="84" height="18" fill="#1e3a5f" rx="3"/>
  <text x="260" y="52" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">신규 지역 오픈</text>

  <!-- Event annotation dot -->
  <circle cx="275" cy="85" r="5" fill="#f59e0b" opacity="0.9"/>
  <circle cx="292" cy="78" r="5" fill="#3b82f6"/>

  <!-- Peak annotation -->
  <line x1="292" y1="78" x2="330" y2="55" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="310" y="44" width="120" height="18" fill="#1e3a5f" rx="3"/>
  <text x="370" y="56" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">경험치 +38% 피크</text>

  <!-- Y axis label -->
  <text x="20" y="148" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#475569" text-anchor="middle" transform="rotate(-90,20,148)">일평균 경험치 획득량</text>

  <!-- X axis ticks -->
  <text x="145" y="264" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#475569" text-anchor="middle">1월</text>
  <text x="258" y="264" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">2월</text>
  <text x="380" y="264" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#475569" text-anchor="middle">3월</text>
  <text x="515" y="264" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#475569" text-anchor="middle">4월</text>

  <!-- Stat badge -->
  <rect x="390" y="155" width="155" height="52" fill="#0f172a" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="467" y="172" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b" text-anchor="middle">분석 대상 유저</text>
  <text x="467" y="190" font-family="'Helvetica Neue',sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="700">96,000명</text>
  <text x="467" y="203" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#475569" text-anchor="middle">285Lv 이상 실데이터</text>

  <!-- Title -->
  <text x="70" y="295" font-family="'Helvetica Neue',sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">메이플스토리 고레벨 유저 경험치 분석</text>
  <text x="70" y="313" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#64748b">신규 지역·이벤트의 경험치 영향 정량 측정</text>
</svg>
