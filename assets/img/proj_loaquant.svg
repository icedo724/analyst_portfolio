<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f8f9fa"/>
  <!-- Grid -->
  <line x1="55" y1="30" x2="55" y2="195" stroke="#dee2e6" stroke-width="1"/>
  <line x1="55" y1="195" x2="375" y2="195" stroke="#dee2e6" stroke-width="1"/>
  <line x1="55" y1="75"  x2="375" y2="75"  stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="55" y1="115" x2="375" y2="115" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="55" y1="155" x2="375" y2="155" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <!-- Price time series -->
  <polyline points="65,155 85,148 105,140 125,132 145,125 155,118 160,100 170,82 180,75 190,88 205,95 220,90 235,85 250,92 265,105 275,118 290,128 305,135 320,140 340,143 360,145"
    fill="none" stroke="#00369f" stroke-width="2.5"/>
  <polygon points="65,155 85,148 105,140 125,132 145,125 155,118 160,100 170,82 180,75 190,88 205,95 220,90 235,85 250,92 265,105 275,118 290,128 305,135 320,140 340,143 360,145 360,195 65,195"
    fill="#00369f" opacity="0.06"/>
  <!-- Event markers -->
  <line x1="160" y1="30" x2="160" y2="195" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="130" y="30" width="64" height="16" fill="#e63946" rx="3" opacity="0.12"/>
  <text x="162" y="41" font-family="sans-serif" font-size="8" fill="#e63946" text-anchor="middle">이벤트 시작</text>
  <line x1="265" y1="30" x2="265" y2="195" stroke="#f4a261" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="238" y="30" width="58" height="16" fill="#f4a261" rx="3" opacity="0.15"/>
  <text x="267" y="41" font-family="sans-serif" font-size="8" fill="#f4a261" text-anchor="middle">이벤트 종료</text>
  <!-- Axis labels -->
  <text x="215" y="213" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle">시간 →</text>
  <text x="30" y="115" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,30,115)">재화 가격</text>
  <text x="215" y="232" font-family="sans-serif" font-size="10" fill="#495057" text-anchor="middle">로스트아크 경제 시계열 분석</text>
</svg>
