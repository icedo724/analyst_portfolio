<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f8f9fa"/>
  <!-- Confusion matrix grid -->
  <rect x="110" y="50" width="75" height="65" fill="#00369f" opacity="0.75" rx="2"/>
  <rect x="190" y="50" width="75" height="65" fill="#e63946" opacity="0.18" rx="2"/>
  <rect x="110" y="120" width="75" height="65" fill="#e63946" opacity="0.18" rx="2"/>
  <rect x="190" y="120" width="75" height="65" fill="#00369f" opacity="0.65" rx="2"/>
  <!-- Matrix labels -->
  <text x="147" y="88" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">TP</text>
  <text x="147" y="106" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">너프 예측</text>
  <text x="227" y="88" font-family="sans-serif" font-size="18" fill="#e63946" text-anchor="middle" font-weight="bold">FP</text>
  <text x="227" y="106" font-family="sans-serif" font-size="10" fill="#e63946" text-anchor="middle" opacity="0.7">오탐</text>
  <text x="147" y="158" font-family="sans-serif" font-size="18" fill="#e63946" text-anchor="middle" font-weight="bold">FN</text>
  <text x="147" y="176" font-family="sans-serif" font-size="10" fill="#e63946" text-anchor="middle" opacity="0.7">미탐</text>
  <text x="227" y="158" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">TN</text>
  <text x="227" y="176" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">버프 예측</text>
  <!-- Axis labels -->
  <text x="147" y="35" font-family="sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">실제: 너프</text>
  <text x="227" y="35" font-family="sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">실제: 버프</text>
  <text x="88" y="88" font-family="sans-serif" font-size="10" fill="#6c757d" text-anchor="middle" transform="rotate(-90,88,88)">예측: 너프</text>
  <text x="88" y="158" font-family="sans-serif" font-size="10" fill="#6c757d" text-anchor="middle" transform="rotate(-90,88,158)">예측: 버프</text>
  <!-- Accuracy badge -->
  <rect x="295" y="70" width="85" height="50" fill="white" stroke="#00369f" stroke-width="1.5" rx="6"/>
  <text x="337" y="92" font-family="sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">Accuracy</text>
  <text x="337" y="112" font-family="sans-serif" font-size="18" fill="#00369f" text-anchor="middle" font-weight="bold">72%</text>
  <text x="215" y="230" font-family="sans-serif" font-size="10" fill="#495057" text-anchor="middle">LoL 패치 방향 예측 분류 모델</text>
</svg>
