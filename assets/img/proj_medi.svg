<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f8f9fa"/>
  <!-- Grid lines -->
  <line x1="60" y1="30" x2="60" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <line x1="60" y1="200" x2="360" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <line x1="60" y1="60" x2="360" y2="60" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="100" x2="360" y2="100" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="140" x2="360" y2="140" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4,4"/>
  <!-- Bars - before -->
  <rect x="80" y="80" width="30" height="120" fill="#adb5bd" rx="3"/>
  <rect x="150" y="110" width="30" height="90" fill="#adb5bd" rx="3"/>
  <rect x="220" y="60" width="30" height="140" fill="#adb5bd" rx="3"/>
  <rect x="290" y="130" width="30" height="70" fill="#adb5bd" rx="3"/>
  <!-- Bars - after (highlighted) -->
  <rect x="112" y="50" width="30" height="150" fill="#00369f" rx="3" opacity="0.9"/>
  <rect x="182" y="70" width="30" height="130" fill="#00369f" rx="3" opacity="0.9"/>
  <rect x="252" y="40" width="30" height="160" fill="#00369f" rx="3" opacity="0.9"/>
  <rect x="322" y="90" width="30" height="110" fill="#00369f" rx="3" opacity="0.9"/>
  <!-- Grade badges -->
  <rect x="80" y="34" width="22" height="14" fill="#6c757d" rx="2"/>
  <text x="91" y="44" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">C</text>
  <rect x="112" y="34" width="22" height="14" fill="#00369f" rx="2"/>
  <text x="127" y="44" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">A</text>
  <!-- Label -->
  <text x="200" y="230" font-family="sans-serif" font-size="11" fill="#495057" text-anchor="middle">거래처 등급 재조정</text>
</svg>
