<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="barA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="barB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="360" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="60" x2="80" y2="280" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="280" x2="550" y2="280" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="100" x2="550" y2="100" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="80" y1="140" x2="550" y2="140" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="80" y1="180" x2="550" y2="180" stroke="#1e3a5f" stroke-width="0.5"/>
  <line x1="80" y1="220" x2="550" y2="220" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- Before bars (gray) -->
  <rect x="100" y="170" width="40" height="110" fill="#334155" rx="3" opacity="0.8"/>
  <rect x="210" y="190" width="40" height="90"  fill="#334155" rx="3" opacity="0.8"/>
  <rect x="320" y="150" width="40" height="130" fill="#334155" rx="3" opacity="0.8"/>
  <rect x="430" y="200" width="40" height="80"  fill="#334155" rx="3" opacity="0.8"/>

  <!-- After bars (blue gradient) -->
  <rect x="148" y="100" width="40" height="180" fill="url(#barA)" rx="3"/>
  <rect x="258" y="115" width="40" height="165" fill="url(#barA)" rx="3"/>
  <rect x="368" y="80"  width="40" height="200" fill="url(#barA)" rx="3"/>
  <rect x="478" y="130" width="40" height="150" fill="url(#barA)" rx="3"/>

  <!-- Grade badges (before → after) -->
  <rect x="100" y="155" width="30" height="14" fill="#475569" rx="3"/>
  <text x="115" y="165" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">C등급</text>
  <rect x="148" y="86"  width="30" height="14" fill="#1d4ed8" rx="3"/>
  <text x="168" y="96"  font-family="'Helvetica Neue',sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">A등급</text>

  <rect x="210" y="175" width="30" height="14" fill="#475569" rx="3"/>
  <text x="230" y="185" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">B등급</text>
  <rect x="258" y="101" width="30" height="14" fill="#1d4ed8" rx="3"/>
  <text x="278" y="111" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">A등급</text>

  <!-- Legend -->
  <rect x="340" y="290" width="12" height="12" fill="#475569" rx="2"/>
  <text x="358" y="301" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#64748b">기존 등급</text>
  <rect x="430" y="290" width="12" height="12" fill="#1d4ed8" rx="2"/>
  <text x="448" y="301" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd">재조정 등급</text>

  <!-- Title area -->
  <text x="80" y="332" font-family="'Helvetica Neue',sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">거래처 등급 재조정</text>
  <text x="80" y="350" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#64748b">카이제곱 검정 기반 정량 기준 전환</text>
</svg>
