<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)" rx="8"/>

  <!-- Horizontal bar chart: tech stack frequency -->
  <!-- Axis -->
  <line x1="160" y1="50" x2="160" y2="265" stroke="#334155" stroke-width="1"/>
  <line x1="160" y1="265" x2="530" y2="265" stroke="#334155" stroke-width="1"/>

  <!-- Bars -->
  <rect x="161" y="58"  width="310" height="24" fill="#3b82f6" rx="3" opacity="0.9"/>
  <rect x="161" y="90"  width="270" height="24" fill="#3b82f6" rx="3" opacity="0.85"/>
  <rect x="161" y="122" width="240" height="24" fill="#3b82f6" rx="3" opacity="0.8"/>
  <rect x="161" y="154" width="200" height="24" fill="#3b82f6" rx="3" opacity="0.75"/>
  <rect x="161" y="186" width="175" height="24" fill="#3b82f6" rx="3" opacity="0.65"/>
  <rect x="161" y="218" width="140" height="24" fill="#3b82f6" rx="3" opacity="0.55"/>

  <!-- Bar labels (left) -->
  <text x="152" y="75"  font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">Python</text>
  <text x="152" y="107" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">SQL</text>
  <text x="152" y="139" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">Tableau</text>
  <text x="152" y="171" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">Power BI</text>
  <text x="152" y="203" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">Excel</text>
  <text x="152" y="235" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">R</text>

  <!-- Count labels (right of bar) -->
  <text x="478" y="75"  font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">1,842</text>
  <text x="438" y="107" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">1,601</text>
  <text x="408" y="139" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">1,423</text>
  <text x="368" y="171" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">1,186</text>
  <text x="343" y="203" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">1,038</text>
  <text x="308" y="235" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#93c5fd" font-weight="600">  831</text>

  <!-- Stats badges -->
  <rect x="330" y="280" width="90" height="36" fill="#1e3a5f" rx="6" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="375" y="294" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b" text-anchor="middle">수집 공고</text>
  <text x="375" y="309" font-family="'Helvetica Neue',sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="700">3,200+</text>

  <rect x="435" y="280" width="90" height="36" fill="#1e3a5f" rx="6" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="480" y="294" font-family="'Helvetica Neue',sans-serif" font-size="9"  fill="#64748b" text-anchor="middle">직무 카테고리</text>
  <text x="480" y="309" font-family="'Helvetica Neue',sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="700">12개</text>

  <!-- Title -->
  <text x="30" y="332" font-family="'Helvetica Neue',sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">JobSonar — 채용공고 기술스택 빈도 분석</text>
  <text x="30" y="350" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#64748b">자동 수집 · 직무별 요구 기술 집계 · Streamlit 대시보드</text>
</svg>
