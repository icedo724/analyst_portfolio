<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f8f9fa"/>
  <!-- Axes -->
  <line x1="55" y1="30" x2="55" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <line x1="55" y1="200" x2="375" y2="200" stroke="#dee2e6" stroke-width="1"/>
  <!-- Cluster A - 캐주얼 (light blue) -->
  <circle cx="100" cy="160" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="115" cy="170" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="90" cy="150" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="125" cy="155" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="105" cy="175" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="80" cy="165" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="130" cy="145" r="6" fill="#6ea8fe" opacity="0.7"/>
  <circle cx="95" cy="180" r="6" fill="#6ea8fe" opacity="0.7"/>
  <ellipse cx="107" cy="163" rx="42" ry="28" fill="none" stroke="#6ea8fe" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="107" y="210" font-family="sans-serif" font-size="9" fill="#6ea8fe" text-anchor="middle">캐주얼</text>
  <!-- Cluster B - 하드코어 (dark blue) -->
  <circle cx="300" cy="55" r="6" fill="#00369f" opacity="0.8"/>
