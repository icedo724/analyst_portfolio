  <!-- Cluster D - 중간층 (gray) -->
  <circle cx="165" cy="100" r="6" fill="#6c757d" opacity="0.7"/>
  <circle cx="180" cy="110" r="6" fill="#6c757d" opacity="0.7"/>
  <circle cx="150" cy="110" r="6" fill="#6c757d" opacity="0.7"/>
  <circle cx="170" cy="90" r="6" fill="#6c757d" opacity="0.7"/>
