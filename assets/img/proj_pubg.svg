  <!-- Axis labels -->
  <text x="215" y="218" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle">킬 수 →</text>
  <text x="30" y="115" font-family="sans-serif" font-size="9" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,30,115)">생존 시간 →</text>
</svg>
