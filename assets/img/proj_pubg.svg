  <circle cx="285" cy="70" r="6" fill="#00369f" opacity="0.8"/>
  <circle cx="310" cy="48" r="6" fill="#00369f" opacity="0.8"/>
  <circle cx="330" cy="75" r="6" fill="#00369f" opacity="0.8"/>
  <circle cx="295" cy="45" r="6" fill="#00369f" opacity="0.8"/>
  <ellipse cx="308" cy="60" rx="38" ry="24" fill="none" stroke="#00369f" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="308" y="95" font-family="sans-serif" font-size="9" fill="#00369f" text-anchor="middle">하드코어</text>
  <!-- Cluster C - 스나이퍼 (teal) -->
  <circle cx="230" cy="130" r="6" fill="#2698ba" opacity="0.75"/>
  <circle cx="245" cy="120" r="6" fill="#2698ba" opacity="0.75"/>
  <circle cx="215" cy="140" r="6" fill="#2698ba" opacity="0.75"/>
  <circle cx="255" cy="135" r="6" fill="#2698ba" opacity="0.75"/>
